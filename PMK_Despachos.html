<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PMK · Despachos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #EEEBE4; }
    body { font-family: 'DM Sans', sans-serif; min-height: 100vh; }
    .drop-zone { transition: border-color .15s, background .15s; }
    .drop-zone:hover { border-color: #222 !important; background: #e8e4dc !important; }
    .file-row:hover { background: #f5f2eb; }
    .label-card { transition: box-shadow .15s; }
    .label-card:hover { box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    .item-row:hover { background: #faf9f6; }
    .btn-primary { transition: background .15s, transform .1s; }
    .btn-primary:hover:not(:disabled) { background: #333 !important; }
    .btn-primary:active:not(:disabled) { transform: scale(0.98); }
    .cb { accent-color: #111; width: 17px; height: 17px; cursor: pointer; flex-shrink: 0; }
    input[type=text]:focus { outline: 2px solid #111; outline-offset: 1px; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
    #boot { font-family: 'DM Mono', monospace; font-size: 13px; color: #888; padding: 40px; text-align: center; }

    /* ─── Vista de impresión 2x2 en A4 ─── */
    #print-area { display: none; }
    @page { size: A4 portrait; margin: 5mm; }
    @media print {
      html, body { background: #fff !important; }
      .ui-content { display: none !important; }
      #print-area { display: block !important; }
      .print-page {
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 1fr 1fr;
        gap: 2mm;
        width: 200mm;
        height: 287mm;
        page-break-after: always;
        box-sizing: border-box;
      }
      .print-page:last-child { page-break-after: auto; }
      .print-cell {
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }
      .print-cell img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
      }
    }
  </style>
</head>
<body>
  <div id="root"><div id="boot">Cargando…</div></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef } = React;

    // ── pdf.js worker setup ───────────────────────────────
    const PDFJS = window.pdfjsLib || window["pdfjs-dist/build/pdf"];
    if (PDFJS) {
      PDFJS.GlobalWorkerOptions.workerSrc =
        "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
    }

    // ── Config (mismo que el JSX original) ───────────────
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxSBP5-BGCizwyY5bNcQfJBguQ9dhZYNmbtd5NluoZcD6SqtSQ8siK2GNR_LLcElmTt/exec";
    const TOKEN = "PMK2026";
    const C = { CLIENTE: 2, ARTICULO: 4, COLOR: 5, TALLE: 6, ESTADO: 11 };
    const OK_STATES = new Set(["SEPARADO", "LISTO"]);

    // ── Matching helpers ─────────────────────────────────
    const DIACRITICS = new RegExp("[\\u0300-\\u036f]", "g");
    const norm = s =>
      (s || "").toLowerCase().normalize("NFD").replace(DIACRITICS, "")
        .replace(/[^a-z\s]/g, "").trim().split(/\s+/).filter(Boolean).sort().join(" ");

    function namesMatch(extracted, cliente) {
      const a = norm(extracted).split(" ").filter(Boolean);
      const b = norm(cliente).split(" ").filter(Boolean);
      if (!a.length || !b.length) return false;
      return a.every(aw => b.some(bw => bw.startsWith(aw) || aw.startsWith(bw)));
    }

    // ── Recortar canvas al área de contenido (descarta espacio en blanco) ──
    // Escanea pixels no-blancos para encontrar el bounding box.
    // Ignora el 22% inferior del page para evitar el "Powered by TCPDF" footer.
    function autoCropToContent(canvas, threshold, paddingPx) {
      threshold = threshold != null ? threshold : 230;
      paddingPx = paddingPx != null ? paddingPx : 6;
      const ctx = canvas.getContext("2d");
      const w = canvas.width, h = canvas.height;
      const scanH = Math.floor(h * 0.78);
      let imgData;
      try {
        imgData = ctx.getImageData(0, 0, w, scanH);
      } catch (e) { return canvas; }
      const data = imgData.data;
      const step = 3;
      let minX = w, minY = scanH, maxX = 0, maxY = 0;
      for (let y = 0; y < scanH; y += step) {
        for (let x = 0; x < w; x += step) {
          const i = (y * w + x) * 4;
          const v = Math.min(data[i], data[i + 1], data[i + 2]);
          if (v < threshold) {
            if (x < minX) minX = x;
            if (x > maxX) maxX = x;
            if (y < minY) minY = y;
            if (y > maxY) maxY = y;
          }
        }
      }
      if (minX >= maxX || minY >= maxY) return canvas;
      const x0 = Math.max(0, minX - paddingPx);
      const y0 = Math.max(0, minY - paddingPx);
      const x1 = Math.min(w, maxX + paddingPx);
      const y1 = Math.min(h, maxY + paddingPx);
      const out = document.createElement("canvas");
      out.width = x1 - x0;
      out.height = y1 - y0;
      out.getContext("2d").drawImage(canvas, x0, y0, x1 - x0, y1 - y0, 0, 0, x1 - x0, y1 - y0);
      return out;
    }

    // ── Extraer nombre del destinatario desde el TEXTO del PDF ──
    // (sin IA, sin OCR — pdf.js lee el texto que ya está embebido)
    async function extractNameFromPage(pdfPage) {
      const tc = await pdfPage.getTextContent();
      const lines = [];
      let current = "";
      for (const item of tc.items) {
        if (item.str) current += item.str;
        if (item.hasEOL) {
          const t = current.trim();
          if (t) lines.push(t);
          current = "";
        }
      }
      if (current.trim()) lines.push(current.trim());

      // Buscamos la línea que SEA "DESTINATARIO" (sin texto extra) — evita matchear REMITENTE
      let idx = lines.findIndex(l => /^destinatario\s*:?\s*$/i.test(l));
      if (idx < 0) {
        // fallback: línea que CONTENGA destinatario pero no remitente
        idx = lines.findIndex(l => /destinatario/i.test(l) && !/remitente/i.test(l));
      }
      if (idx >= 0 && idx < lines.length - 1) {
        // Tomamos la siguiente línea con contenido alfabético (saltea líneas vacías/solo símbolos)
        for (let j = idx + 1; j < Math.min(lines.length, idx + 4); j++) {
          const cand = lines[j].trim();
          if (cand && /[a-záéíóúñ]/i.test(cand)) return cand;
        }
      }
      return "";
    }

    function PMKDespachos() {
      const [files, setFiles] = useState([]);
      const [drag, setDrag] = useState(false);
      const [view, setView] = useState("upload");
      const [busy, setBusy] = useState(false);
      const [progress, setProgress] = useState(null);
      const [labels, setLabels] = useState([]);
      const [sel, setSel] = useState(new Set());
      const [saving, setSaving] = useState(false);
      const [toast, setToast] = useState(null);
      const [editName, setEditName] = useState({});
      const [printImages, setPrintImages] = useState([]);
      const [printing, setPrinting] = useState(false);
      const inputRef = useRef();
      const sheetRowsRef = useRef([]);

      const pdfjsReady = !!PDFJS;

      const addFiles = fs => {
        const pdfs = [...fs].filter(f => f.name.toLowerCase().endsWith(".pdf") || f.type === "application/pdf");
        setFiles(p => {
          const have = new Set(p.map(f => f.name));
          return [...p, ...pdfs.filter(f => !have.has(f.name))];
        });
      };

      // ── Google Sheets vía Apps Script ─────────────────
      const readSheet = async () => {
        const r = await fetch(`${SCRIPT_URL}?action=read&sheet=PEDIDOS&range=A:L&token=${TOKEN}`);
        const d = await r.json();
        return d.values || [];
      };

      const updateRow = async rowIndex => {
        const sheetRow = rowIndex + 2;
        const r = await fetch(`${SCRIPT_URL}?action=update&token=${TOKEN}&sheet=PEDIDOS&row=${sheetRow}&col=12&value=ENTREGADO`);
        return r.json().catch(() => ({}));
      };

      // ── Encontrar items que matchean con el nombre ────
      const findItems = (name, rows, labelIdx) =>
        rows.map((row, idx) => ({ row, idx }))
          .filter(({ row }) => OK_STATES.has((row[C.ESTADO] || "").trim().toUpperCase()))
          .filter(({ row }) => namesMatch(name, row[C.CLIENTE] || ""))
          .map(({ row, idx }) => ({
            id: `${labelIdx}-${idx}`,
            rowIndex: idx,
            cliente: row[C.CLIENTE] || "",
            articulo: row[C.ARTICULO] || "",
            color: row[C.COLOR] || "",
            talle: row[C.TALLE] || "",
            estado: (row[C.ESTADO] || "").trim().toUpperCase()
          }));

      // ── Procesamiento principal ───────────────────────
      const processAll = async () => {
        if (!pdfjsReady || !files.length) return;
        setBusy(true); setToast(null);
        try {
          setProgress({ i: 0, n: 0, msg: "Leyendo planilla…" });
          let rows = await readSheet();
          rows = rows.filter(row => row.some(c => (c || "").toString().trim()));
          if (rows.length && (rows[0][0] || "").toString().toLowerCase().includes("fecha")) {
            rows = rows.slice(1);
          }
          sheetRowsRef.current = rows;

          // Abrir todos los PDFs y contar páginas totales
          const pdfDocs = [];
          let totalPages = 0;
          for (const f of files) {
            const pdf = await PDFJS.getDocument({ data: await f.arrayBuffer() }).promise;
            pdfDocs.push({ file: f, pdf });
            totalPages += pdf.numPages;
          }

          const results = [];
          let processed = 0;
          let labelIdx = 0;
          for (const { file, pdf } of pdfDocs) {
            const isMulti = pdf.numPages > 1;
            for (let p = 1; p <= pdf.numPages; p++) {
              processed++;
              const label = isMulti ? `${file.name} · pág. ${p}` : file.name;
              setProgress({ i: processed, n: totalPages, msg: label });
              const pg = await pdf.getPage(p);
              const name = await extractNameFromPage(pg);
              results.push({
                fileName: label,
                name,
                items: findItems(name, rows, labelIdx)
              });
              labelIdx++;
            }
          }

          setLabels(results);
          setSel(new Set(results.flatMap(l => l.items.map(i => i.id))));
          setView("results");
        } catch (e) {
          console.error(e);
          setToast({ type: "err", msg: `Error: ${e.message}` });
        } finally {
          setBusy(false); setProgress(null);
        }
      };

      const reSearch = (li, newName) => {
        setLabels(prev => {
          const next = [...prev];
          const oldItems = prev[li].items;
          const newItems = findItems(newName, sheetRowsRef.current, li);
          next[li] = { ...next[li], name: newName, items: newItems };
          setSel(s => {
            const ns = new Set(s);
            oldItems.forEach(i => ns.delete(i.id));
            newItems.forEach(i => ns.add(i.id));
            return ns;
          });
          return next;
        });
      };

      const toggleItem = id => setSel(p => {
        const n = new Set(p);
        if (n.has(id)) n.delete(id); else n.add(id);
        return n;
      });

      const toggleAll = () => {
        const all = labels.flatMap(l => l.items.map(i => i.id));
        if (sel.size === all.length) setSel(new Set());
        else setSel(new Set(all));
      };

      const markEntregado = async () => {
        const toMark = labels.flatMap(l => l.items).filter(i => sel.has(i.id));
        if (!toMark.length) return;
        setSaving(true);
        // Evitar marcar la misma fila dos veces (si dos etiquetas matchearon la misma fila)
        const uniqueRows = [...new Set(toMark.map(i => i.rowIndex))];
        let ok = 0;
        for (const rowIndex of uniqueRows) {
          try { await updateRow(rowIndex); ok++; } catch (e) { console.error(e); }
        }
        setToast({ type: "ok", msg: `✓ ${ok} pedido${ok !== 1 ? "s" : ""} marcado${ok !== 1 ? "s" : ""} como ENTREGADO` });
        setSaving(false);
      };

      // ── Render PDFs a imágenes y abrir diálogo de impresión 2x2 en A4 ──
      const handlePrint = async () => {
        if (!labels.length || printing) return;
        setPrinting(true);
        try {
          const fileMap = new Map(files.map(f => [f.name, f]));
          // Cachear pdfs ya abiertos para no reabrir el mismo file varias veces
          const pdfCache = new Map();
          const imgs = [];
          for (let i = 0; i < labels.length; i++) {
            setProgress({ i: i + 1, n: labels.length, msg: `Renderizando ${labels[i].fileName}` });
            const lbl = labels[i].fileName;
            let sourceName = lbl;
            let pageNum = 1;
            const m = lbl.match(/^(.+)\s·\spág\.\s(\d+)$/);
            if (m) { sourceName = m[1]; pageNum = parseInt(m[2], 10); }
            const file = fileMap.get(sourceName);
            if (!file) continue;
            let pdf = pdfCache.get(sourceName);
            if (!pdf) {
              pdf = await PDFJS.getDocument({ data: await file.arrayBuffer() }).promise;
              pdfCache.set(sourceName, pdf);
            }
            const pg = await pdf.getPage(pageNum);
            const vp = pg.getViewport({ scale: 2.0 });
            const cv = document.createElement("canvas");
            cv.width = vp.width; cv.height = vp.height;
            await pg.render({ canvasContext: cv.getContext("2d"), viewport: vp }).promise;
            const cropped = autoCropToContent(cv);
            imgs.push(cropped.toDataURL("image/jpeg", 0.9));
          }
          setPrintImages(imgs);
          setProgress(null);
          // Esperar a que React commitee el DOM, luego abrir el diálogo de impresión
          setTimeout(() => {
            window.print();
            // Limpiar después (si cancela, igual liberamos memoria)
            setTimeout(() => { setPrintImages([]); setPrinting(false); }, 800);
          }, 300);
        } catch (e) {
          console.error(e);
          setToast({ type: "err", msg: `Error al renderizar: ${e.message}` });
          setPrinting(false);
          setProgress(null);
        }
      };

      const reset = () => {
        setFiles([]); setLabels([]); setSel(new Set()); setToast(null); setView("upload");
        setPrintImages([]); setPrinting(false);
      };

      const totalSel = sel.size;
      const totalItems = labels.flatMap(l => l.items).length;

      return (
        <React.Fragment>
        <div className="ui-content" style={{ minHeight: "100vh", background: "#EEEBE4" }}>

          {/* Header */}
          <header style={{ background: "#111", color: "#fff", height: 52, padding: "0 24px", display: "flex", alignItems: "center", gap: 14 }}>
            <span style={{ fontFamily: "'DM Mono', monospace", fontSize: 15, fontWeight: 500, letterSpacing: 3 }}>PMK</span>
            <div style={{ width: 1, height: 16, background: "#333" }} />
            <span style={{ color: "#777", fontSize: 12, letterSpacing: 1.5, fontFamily: "'DM Mono', monospace" }}>DESPACHOS</span>
            {view === "results" && (
              <button onClick={reset} style={{ marginLeft: "auto", background: "transparent", border: "1px solid #333", color: "#888", padding: "5px 14px", borderRadius: 6, cursor: "pointer", fontSize: 12, fontFamily: "'DM Mono', monospace" }}>
                ← NUEVA CARGA
              </button>
            )}
          </header>

          <div style={{ maxWidth: 680, margin: "0 auto", padding: view === "results" ? "24px 16px 100px" : "40px 16px" }}>

            {view === "upload" && (
              <React.Fragment>
                <div style={{ marginBottom: 28, textAlign: "center" }}>
                  <h1 style={{ fontSize: 24, fontWeight: 700, color: "#111", marginBottom: 6 }}>Preparar despachos</h1>
                  <p style={{ color: "#888", fontSize: 14 }}>Cargá las guías en PDF, la herramienta lee los destinatarios y los busca en la planilla.</p>
                </div>

                <div
                  className="drop-zone"
                  onDrop={e => { e.preventDefault(); setDrag(false); addFiles(e.dataTransfer.files); }}
                  onDragOver={e => { e.preventDefault(); setDrag(true); }}
                  onDragLeave={() => setDrag(false)}
                  onClick={() => inputRef.current?.click()}
                  style={{
                    border: `2px dashed ${drag ? "#222" : "#c8c4bc"}`, borderRadius: 16,
                    padding: "52px 24px", textAlign: "center", cursor: "pointer",
                    background: drag ? "#e8e4dc" : "#fff", marginBottom: 20
                  }}
                >
                  <div style={{ fontSize: 48, marginBottom: 12 }}>📦</div>
                  <div style={{ fontWeight: 600, fontSize: 16, marginBottom: 6, color: "#111" }}>Arrastrá las guías de envío</div>
                  <div style={{ color: "#aaa", fontSize: 13 }}>o hacé click para seleccionar · Solo PDF</div>
                  <input ref={inputRef} type="file" accept=".pdf,application/pdf" multiple style={{ display: "none" }} onChange={e => addFiles(e.target.files)} />
                </div>

                {files.length > 0 && (
                  <div style={{ background: "#fff", borderRadius: 12, border: "1px solid #e2dfd8", overflow: "hidden", marginBottom: 20 }}>
                    <div style={{ padding: "10px 16px", borderBottom: "1px solid #eee", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <span style={{ fontFamily: "'DM Mono', monospace", fontSize: 11, color: "#999", letterSpacing: 0.5 }}>
                        {files.length} ARCHIVO{files.length !== 1 ? "S" : ""}
                      </span>
                      <button onClick={() => setFiles([])} style={{ background: "none", border: "none", color: "#bbb", cursor: "pointer", fontSize: 12 }}>Limpiar todo</button>
                    </div>
                    {files.map((f, i) => (
                      <div key={f.name} className="file-row" style={{ padding: "9px 16px", display: "flex", alignItems: "center", gap: 10, borderBottom: i < files.length - 1 ? "1px solid #f4f2ee" : "none" }}>
                        <span style={{ fontSize: 14, flexShrink: 0 }}>📄</span>
                        <span style={{ flex: 1, color: "#444", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", fontFamily: "'DM Mono', monospace", fontSize: 12 }}>{f.name}</span>
                        <button onClick={() => setFiles(p => p.filter(x => x.name !== f.name))}
                          style={{ background: "none", border: "none", color: "#ccc", cursor: "pointer", fontSize: 18, lineHeight: 1, padding: "0 2px" }}>×</button>
                      </div>
                    ))}
                  </div>
                )}

                <button onClick={processAll} disabled={!pdfjsReady || !files.length || busy}
                  className="btn-primary"
                  style={{
                    width: "100%", padding: "15px", borderRadius: 10, border: "none",
                    background: (!pdfjsReady || !files.length || busy) ? "#ccc" : "#111",
                    color: "#fff", fontWeight: 600, fontSize: 15, cursor: (!pdfjsReady || !files.length || busy) ? "not-allowed" : "pointer"
                  }}>
                  {busy && progress
                    ? <span style={{ fontFamily: "'DM Mono', monospace", fontSize: 13 }}>
                        {progress.n > 0 ? `[${progress.i}/${progress.n}] ` : ""}{progress.msg}
                      </span>
                    : `Procesar ${files.length || ""} archivo${files.length !== 1 ? "s" : ""}`}
                </button>

                {busy && progress && progress.n > 0 && (
                  <div style={{ marginTop: 12, background: "#e2dfd8", borderRadius: 4, height: 4, overflow: "hidden" }}>
                    <div style={{
                      height: "100%", background: "#111", borderRadius: 4,
                      width: `${(progress.i / progress.n) * 100}%`,
                      transition: "width .4s ease"
                    }} />
                  </div>
                )}

                {toast && (
                  <div style={{ marginTop: 16, padding: "12px 16px", background: toast.type === "ok" ? "#f0fdf4" : "#fef2f2", border: `1px solid ${toast.type === "ok" ? "#bbf7d0" : "#fecaca"}`, borderRadius: 8, fontSize: 13, color: toast.type === "ok" ? "#15803d" : "#b91c1c" }}>
                    {toast.msg}
                  </div>
                )}

                {!pdfjsReady && (
                  <p style={{ marginTop: 14, textAlign: "center", fontSize: 12, color: "#aaa", fontFamily: "'DM Mono', monospace" }}>Cargando motor PDF…</p>
                )}
              </React.Fragment>
            )}

            {view === "results" && (
              <React.Fragment>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
                  <div>
                    <span style={{ fontWeight: 700, fontSize: 18, color: "#111" }}>{labels.length} etiqueta{labels.length !== 1 ? "s" : ""}</span>
                    <span style={{ color: "#888", fontSize: 14, marginLeft: 8 }}>· {totalItems} pedido{totalItems !== 1 ? "s" : ""} encontrado{totalItems !== 1 ? "s" : ""}</span>
                  </div>
                  <button onClick={toggleAll} style={{ background: "none", border: "1px solid #ccc", borderRadius: 6, padding: "5px 12px", fontSize: 12, cursor: "pointer", color: "#555" }}>
                    {sel.size === totalItems && totalItems > 0 ? "Deseleccionar todo" : "Seleccionar todo"}
                  </button>
                </div>

                {labels.map((lbl, li) => (
                  <div key={li} className="label-card" style={{ background: "#fff", borderRadius: 12, border: "1px solid #e2dfd8", marginBottom: 14, overflow: "hidden" }}>

                    <div style={{ padding: "13px 16px", background: "#f7f5f0", borderBottom: "1px solid #eae7e0", display: "flex", alignItems: "flex-start", gap: 12 }}>
                      <div style={{ flex: 1 }}>
                        {editName[li] !== undefined ? (
                          <div style={{ display: "flex", gap: 8 }}>
                            <input
                              autoFocus
                              type="text"
                              value={editName[li]}
                              onChange={e => setEditName(p => ({ ...p, [li]: e.target.value }))}
                              onKeyDown={e => {
                                if (e.key === "Enter") {
                                  reSearch(li, editName[li].trim());
                                  setEditName(p => { const c = { ...p }; delete c[li]; return c; });
                                }
                                if (e.key === "Escape") setEditName(p => { const c = { ...p }; delete c[li]; return c; });
                              }}
                              placeholder="Nombre del destinatario…"
                              style={{ flex: 1, padding: "6px 10px", border: "1px solid #ccc", borderRadius: 7, fontSize: 13, fontFamily: "'DM Sans', sans-serif" }}
                            />
                            <button
                              onClick={() => {
                                reSearch(li, editName[li].trim());
                                setEditName(p => { const c = { ...p }; delete c[li]; return c; });
                              }}
                              style={{ padding: "6px 14px", background: "#111", color: "#fff", border: "none", borderRadius: 7, cursor: "pointer", fontSize: 12, fontWeight: 600 }}>
                              Buscar
                            </button>
                          </div>
                        ) : (
                          <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                            <span style={{ fontWeight: 600, fontSize: 14, color: lbl.name ? "#111" : "#bbb", fontStyle: lbl.name ? "normal" : "italic" }}>
                              {lbl.name || "nombre no detectado"}
                            </span>
                            <button onClick={() => setEditName(p => ({ ...p, [li]: lbl.name || "" }))}
                              style={{ background: "none", border: "1px solid #ddd", borderRadius: 5, padding: "2px 8px", fontSize: 11, color: "#999", cursor: "pointer" }}>
                              editar
                            </button>
                          </div>
                        )}
                        <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, color: "#bbb", marginTop: 3, letterSpacing: 0.3 }}>{lbl.fileName}</div>
                      </div>
                      <span style={{
                        flexShrink: 0, fontSize: 11, fontWeight: 700, padding: "3px 10px", borderRadius: 20,
                        fontFamily: "'DM Mono', monospace", letterSpacing: 0.5,
                        background: lbl.items.length ? "#dcfce7" : "#fee2e2",
                        color: lbl.items.length ? "#15803d" : "#b91c1c"
                      }}>
                        {lbl.items.length ? `${lbl.items.length} PEDIDO${lbl.items.length !== 1 ? "S" : ""}` : "SIN MATCH"}
                      </span>
                    </div>

                    {lbl.items.length ? lbl.items.map((item, ii) => (
                      <label key={item.id} className="item-row" style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 16px", borderBottom: ii < lbl.items.length - 1 ? "1px solid #f2f0ec" : "none", cursor: "pointer" }}>
                        <input type="checkbox" className="cb" checked={sel.has(item.id)} onChange={() => toggleItem(item.id)} />
                        <div style={{ flex: 1 }}>
                          <div style={{ fontWeight: 600, fontSize: 14, color: "#111" }}>
                            {[item.articulo, item.color, item.talle].filter(Boolean).join(" · ")}
                          </div>
                          <div style={{ fontSize: 12, color: "#aaa", marginTop: 2, display: "flex", gap: 8, alignItems: "center" }}>
                            <span>{item.cliente}</span>
                            <span style={{
                              fontFamily: "'DM Mono', monospace", fontSize: 10, fontWeight: 700, letterSpacing: 0.5,
                              padding: "1px 7px", borderRadius: 20,
                              background: item.estado === "LISTO" ? "#dcfce7" : "#fef3c7",
                              color: item.estado === "LISTO" ? "#15803d" : "#92400e"
                            }}>{item.estado}</span>
                          </div>
                        </div>
                      </label>
                    )) : (
                      <div style={{ padding: "16px", fontSize: 13, color: "#bbb", fontStyle: "italic" }}>
                        No hay pedidos SEPARADO/LISTO para este destinatario.
                      </div>
                    )}
                  </div>
                ))}
              </React.Fragment>
            )}
          </div>

          {view === "results" && !toast && (
            <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: "#fff", borderTop: "1px solid #e2dfd8", padding: "12px 16px", boxShadow: "0 -4px 24px rgba(0,0,0,0.08)" }}>
              <div style={{ maxWidth: 680, margin: "0 auto", display: "flex", gap: 8 }}>
                <button onClick={handlePrint} disabled={printing || !labels.length}
                  style={{
                    flex: "0 0 auto", padding: "14px 18px", borderRadius: 10,
                    border: "1px solid #111",
                    background: printing ? "#f5f2eb" : "#fff",
                    color: "#111", fontWeight: 600, fontSize: 14,
                    cursor: printing || !labels.length ? "not-allowed" : "pointer",
                    whiteSpace: "nowrap"
                  }}>
                  {printing
                    ? (progress ? `Render ${progress.i}/${progress.n}` : "Abriendo…")
                    : "🖨 Imprimir guías"}
                </button>
                <button onClick={markEntregado} disabled={saving || totalSel === 0 || printing}
                  className="btn-primary"
                  style={{
                    flex: 1, padding: "14px", borderRadius: 10, border: "none",
                    background: (totalSel === 0 || saving || printing) ? "#d1d5db" : "#111",
                    color: "#fff", fontWeight: 700, fontSize: 15,
                    cursor: (totalSel === 0 || saving || printing) ? "not-allowed" : "pointer"
                  }}>
                  {saving ? "Guardando…" : `Marcar ${totalSel} como ENTREGADO`}
                </button>
              </div>
            </div>
          )}

          {view === "results" && toast && (
            <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, padding: "12px 16px", background: toast.type === "ok" ? "#111" : "#dc2626", borderTop: "none" }}>
              <div style={{ maxWidth: 680, margin: "0 auto", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <span style={{ color: "#fff", fontWeight: 600, fontSize: 15 }}>{toast.msg}</span>
                <button onClick={reset} style={{ background: "transparent", border: "1px solid #555", color: "#aaa", padding: "6px 16px", borderRadius: 6, cursor: "pointer", fontSize: 12 }}>
                  Nueva carga →
                </button>
              </div>
            </div>
          )}
        </div>

        {/* Vista de impresión 2x2 en A4 — solo visible en @media print */}
        {printImages.length > 0 && (
          <div id="print-area">
            {Array.from({ length: Math.ceil(printImages.length / 4) }, (_, pageIdx) => (
              <div key={pageIdx} className="print-page">
                {printImages.slice(pageIdx * 4, pageIdx * 4 + 4).map((src, j) => (
                  <div key={j} className="print-cell">
                    <img src={src} alt="" />
                  </div>
                ))}
              </div>
            ))}
          </div>
        )}
        </React.Fragment>
      );
    }

    const boot = document.getElementById("boot");
    if (boot) boot.remove();
    ReactDOM.createRoot(document.getElementById("root")).render(<PMKDespachos />);
  </script>
</body>
</html>
